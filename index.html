<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/CoverYourATS/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free ATS resume keyword optimizer — scan job postings, match keywords, rewrite bullets with AI, generate cover letters." />
    <meta name="theme-color" content="#1e1e24" />
    <title>CoverYourATS — Resume Keyword Optimizer</title>
    <!-- Lucida Console / Monaco are system fonts — no external load needed -->
    <script>
      // GitHub Pages SPA redirect handler
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
